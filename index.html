<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Atithi – Kathiyawadi Open Garden Restaurant, Palanpur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --saffron: #E8660A;
      --saffron-light: #F4892A;
      --turmeric: #D4A017;
      --earth: #2C1A0E;
      --cream: #FDF6EC;
      --warm-white: #FFFBF4;
      --text-dark: #1A0F06;
      --text-mid: #5C3D1E;
      --text-light: #9A7A5A;
      --nav-h: 72px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--text-dark); overflow-x: hidden; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-h);
      background: rgba(13,8,3,0.96); backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; z-index: 1000;
      border-bottom: 1px solid rgba(232,102,10,0.3);
    }
    .logo-wrap { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; }
    .logo-icon { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg,var(--saffron),var(--turmeric)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 6px; box-shadow: 0 0 0 2px rgba(212,160,23,0.4); }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 900; color: #fff; line-height: 1.1; }
    .logo-text span { color: var(--turmeric); font-style: italic; display: block; font-size: 0.68rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { text-decoration: none; color: rgba(255,255,255,0.75); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.25s; position: relative; }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--saffron-light); transition: width 0.3s; }
    .nav-links a:hover { color: #fff; }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-links a.active { color: var(--saffron-light); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 26px; height: 2px; background: #fff; border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu { display: none; position: fixed; top: var(--nav-h); left: 0; width: 100%; background: rgba(13,8,3,0.98); padding: 1rem 5%; flex-direction: column; gap: 0; z-index: 999; border-bottom: 2px solid var(--saffron); }
    .mobile-menu.show { display: flex; }
    .mobile-menu a { color: rgba(255,255,255,0.82); text-decoration: none; font-size: 0.95rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.85rem 0; border-bottom: 1px solid rgba(255,255,255,0.07); }

    /* HERO */
    #home { min-height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .hero-slides { position: absolute; inset: 0; z-index: 0; }
    .hero-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.8s ease; animation: zoomBg 14s ease-in-out infinite alternate; }
    .hero-slide.active { opacity: 1; }
    @keyframes zoomBg { from { transform: scale(1.04); } to { transform: scale(1.12); } }
    .hero-overlay { position: absolute; inset: 0; z-index: 1; background: linear-gradient(135deg, rgba(10,5,2,0.85) 0%, rgba(40,18,5,0.62) 50%, rgba(10,5,2,0.88) 100%); }
    .hero-pattern { position: absolute; inset: 0; z-index: 1; background-image: radial-gradient(circle, rgba(232,102,10,0.07) 1px, transparent 1px); background-size: 38px 38px; }
    .hero-content { position: relative; z-index: 2; max-width: 920px; padding: 0 1.5rem; text-align: center; }
    .hero-ornament { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1.4rem; animation: fadeUp 1s 0.1s ease both; }
    .hero-ornament-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--turmeric)); }
    .hero-ornament-line.r { background: linear-gradient(90deg, var(--turmeric), transparent); }
    .hero-ornament span { font-size: 0.68rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--turmeric); font-weight: 600; }
    .hero-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(232,102,10,0.14); border: 1px solid rgba(232,102,10,0.4); color: var(--saffron-light); font-size: 0.74rem; font-weight: 600; letter-spacing: 0.17em; text-transform: uppercase; padding: 0.45rem 1.4rem; border-radius: 999px; margin-bottom: 1.3rem; animation: fadeUp 1s 0.2s ease both; }
    .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(3.2rem, 10vw, 7.5rem); font-weight: 900; color: #fff; line-height: 0.92; margin-bottom: 0.3rem; animation: fadeUp 1s 0.3s ease both; text-shadow: 0 4px 40px rgba(0,0,0,0.5); }
    .hero-title-sub { font-family: 'Playfair Display', serif; font-size: clamp(1.1rem, 3.5vw, 2rem); font-style: italic; color: var(--turmeric); margin-bottom: 1.4rem; animation: fadeUp 1s 0.4s ease both; }
    .hero-divider { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1.3rem; animation: fadeUp 1s 0.45s ease both; }
    .hero-divider-line { width: 80px; height: 1px; background: rgba(255,255,255,0.22); }
    .hero-divider-diamond { width: 8px; height: 8px; border: 1.5px solid var(--saffron-light); transform: rotate(45deg); background: var(--saffron-light); }
    .hero-sub { font-size: clamp(0.88rem, 2vw, 1.05rem); color: rgba(255,255,255,0.7); line-height: 1.8; max-width: 600px; margin: 0 auto 2.2rem; animation: fadeUp 1s 0.5s ease both; }
    .hero-stats { display: flex; justify-content: center; gap: 2.5rem; margin-bottom: 2.4rem; animation: fadeUp 1s 0.55s ease both; flex-wrap: wrap; }
    .hero-stat { text-align: center; }
    .hero-stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--saffron-light); line-height: 1; }
    .hero-stat-label { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.48); margin-top: 0.3rem; }
    .hero-cta { display: inline-flex; gap: 1rem; flex-wrap: wrap; justify-content: center; animation: fadeUp 1s 0.6s ease both; }
    .hero-dots { position: absolute; bottom: 5.5rem; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 3; }
    .hero-dot { width: 6px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s; }
    .hero-dot.active { background: var(--saffron-light); width: 22px; }
    .scroll-arrow { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 5px; animation: bounce 2.2s infinite; cursor: pointer; }
    .scroll-arrow span { display: block; width: 10px; height: 10px; border-right: 2px solid rgba(255,255,255,0.5); border-bottom: 2px solid rgba(255,255,255,0.5); transform: rotate(45deg); }
    @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }

    /* BUTTONS */
    .btn { display: inline-block; padding: 0.9rem 2.2rem; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; text-decoration: none; cursor: pointer; transition: all 0.28s; border: 2px solid transparent; }
    .btn-primary { background: var(--saffron); color: #fff; border-color: var(--saffron); }
    .btn-primary:hover { background: var(--saffron-light); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,102,10,0.45); }
    .btn-outline { background: transparent; color: #fff; border-color: rgba(255,255,255,0.45); }
    .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    .btn-call { background: var(--saffron); border-color: var(--saffron); color: #fff; }
    .btn-call:hover { background: var(--saffron-light); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,102,10,0.5); }
    .btn-whatsapp { background: #25D366; border-color: #25D366; color: #fff; }
    .btn-whatsapp:hover { background: #1ebe5b; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,211,102,0.4); }

    /* SECTION COMMONS */
    section { padding: 5.5rem 5%; }
    .section-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--saffron); margin-bottom: 0.5rem; }
    .section-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; color: var(--earth); line-height: 1.15; margin-bottom: 1rem; }
    .divider { width: 56px; height: 3px; background: linear-gradient(90deg,var(--saffron),var(--turmeric)); border-radius: 999px; margin: 1rem 0 2.2rem; }
    .divider.center { margin: 1rem auto 2.2rem; }

    /* FEATURES STRIP */
    .features-strip { background: var(--earth); padding: 2.5rem 5%; display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 2rem; }
    .feature-item { display: flex; align-items: center; gap: 1rem; }
    .feature-icon { font-size: 2rem; flex-shrink: 0; }
    .feature-text h4 { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--turmeric); margin-bottom: 0.2rem; }
    .feature-text p { font-size: 0.82rem; color: rgba(255,255,255,0.52); line-height: 1.4; }

    /* MENU SECTION */
    #menu { background: var(--cream); }
    .menu-intro { text-align: center; max-width: 640px; margin: 0 auto 3rem; }
    .menu-tabs { display: flex; flex-wrap: wrap; gap: 0.55rem; justify-content: center; margin-bottom: 2.5rem; }
    .menu-tab { padding: 0.5rem 1.2rem; border-radius: 999px; background: #fff; border: 1.5px solid rgba(232,102,10,0.2); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.25s; color: var(--text-mid); letter-spacing: 0.04em; }
    .menu-tab.active, .menu-tab:hover { background: var(--saffron); border-color: var(--saffron); color: #fff; }
    .menu-panel { display: none; animation: fadeUp 0.4s ease; }
    .menu-panel.active { display: block; }
    .cat-header { background: linear-gradient(135deg,var(--earth) 0%,#3d2512 100%); border-radius: 16px 16px 0 0; padding: 2rem 2.5rem; display: flex; align-items: center; gap: 2rem; overflow: hidden; position: relative; }
    .cat-header::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle,rgba(232,102,10,0.08) 1px,transparent 1px); background-size: 28px 28px; }
    .cat-header-img { width: 140px; height: 100px; border-radius: 12px; object-fit: cover; flex-shrink: 0; border: 2px solid rgba(232,102,10,0.4); position: relative; z-index: 1; }
    .cat-header-text { position: relative; z-index: 1; }
    .cat-header-text h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: #fff; margin-bottom: 0.3rem; }
    .cat-header-text p { font-size: 0.82rem; color: rgba(255,255,255,0.52); }
    .cat-badge { display: inline-block; background: var(--saffron); color: #fff; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.2rem 0.8rem; border-radius: 4px; margin-bottom: 0.6rem; }
    .menu-items-grid { background: #fff; border-radius: 0 0 16px 16px; padding: 1.5rem 2rem; display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 0; box-shadow: 0 4px 30px rgba(0,0,0,0.07); margin-bottom: 1.5rem; }
    .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0.5rem; border-bottom: 1px solid rgba(0,0,0,0.055); font-size: 0.9rem; color: var(--text-dark); }
    .menu-item:hover { background: rgba(232,102,10,0.04); border-radius: 6px; }
    .menu-item-name { flex: 1; }
    .menu-item-detail { font-size: 0.7rem; color: var(--text-light); display: block; }
    .menu-item-price { color: var(--saffron); font-weight: 700; font-size: 0.92rem; white-space: nowrap; margin-left: 1rem; }
    .menu-subhead { font-weight: 700; color: var(--saffron); font-size: 0.82rem; letter-spacing: 0.06em; }

    /* GALLERY */
    #gallery { background: var(--warm-white); }
    .gallery-header { text-align: center; margin-bottom: 2.8rem; }
    .gallery-grid { columns: 3; column-gap: 1rem; max-width: 1100px; margin: 0 auto; }
    .gallery-item { break-inside: avoid; margin-bottom: 1rem; border-radius: 12px; overflow: hidden; position: relative; }
    .gallery-item img { width: 100%; display: block; transition: transform 0.5s; }
    .gallery-item::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg,transparent 50%,rgba(28,10,2,0.6) 100%); opacity: 0; transition: opacity 0.35s; }
    .gallery-item:hover::after { opacity: 1; }
    .gallery-item:hover img { transform: scale(1.06); }

    /* MAP */
    #map-section { background: var(--cream); }
    .map-wrapper { display: grid; grid-template-columns: 1fr 2fr; gap: 3rem; align-items: center; max-width: 1100px; margin: 0 auto; }
    .map-detail { display: flex; align-items: flex-start; gap: 0.7rem; margin-bottom: 0.9rem; }
    .map-icon { width: 20px; height: 20px; color: var(--saffron); flex-shrink: 0; margin-top: 2px; }
    .map-detail p { font-size: 0.9rem; color: var(--text-mid); line-height: 1.65; }
    .map-embed { border-radius: 16px; overflow: hidden; box-shadow: 0 4px 32px rgba(0,0,0,0.13); aspect-ratio: 4/3; }
    .map-embed iframe { width: 100%; height: 100%; border: none; display: block; }

    /* CONTACT */
    #contact { background: var(--earth); color: #fff; }
    .contact-inner { max-width: 900px; margin: 0 auto; text-align: center; }
    #contact .section-label { color: var(--saffron-light); }
    #contact .section-title { color: #fff; }
    #contact .divider { background: linear-gradient(90deg,var(--saffron-light),var(--turmeric)); }
    .contact-tagline { font-size: 1rem; color: rgba(255,255,255,0.55); margin-bottom: 3rem; line-height: 1.7; }
    .contact-cards { display: grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap: 1.5rem; margin-bottom: 3rem; }
    .contact-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 2rem 1.5rem; transition: background 0.3s; }
    .contact-card:hover { background: rgba(255,255,255,0.1); }
    .contact-card .c-icon { width: 46px; height: 46px; background: rgba(232,102,10,0.18); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: var(--saffron-light); }
    .contact-card h4 { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 0.5rem; }
    .contact-card p { font-size: 0.95rem; color: rgba(255,255,255,0.85); line-height: 1.65; }
    .contact-btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }

    footer { background: #070402; color: rgba(255,255,255,0.32); text-align: center; font-size: 0.8rem; padding: 1.6rem 5%; border-top: 1px solid rgba(255,255,255,0.06); }

    @media (max-width: 900px) {
      .map-wrapper { grid-template-columns: 1fr; }
      .gallery-grid { columns: 2; }
      .cat-header-img { width: 100px; height: 75px; }
    }
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      section { padding: 4rem 5%; }
      .gallery-grid { columns: 1; }
      .hero-cta { flex-direction: column; align-items: center; }
      .hero-stats { gap: 1.5rem; }
      .cat-header { flex-direction: column; text-align: center; }
      .cat-header-img { width: 100%; height: 160px; }
      .menu-items-grid { padding: 1rem; grid-template-columns: 1fr; }
      .features-strip { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 400px) {
      .features-strip { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="logo-wrap" href="#home">
    <div class="logo-icon">
      <svg viewBox="0 0 100 100" width="34" height="34" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- Top-left circle -->

        <!-- Bottom-left circle -->
        <circle cx="34" cy="66" r="16" stroke="white" stroke-width="3" fill="none"/>
        <path d="M34,54 A12,12 0 0,1 46,66 A12,12 0 0,0 34,78" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Bottom-right circle -->
        <circle cx="66" cy="66" r="16" stroke="white" stroke-width="3" fill="none"/>

      </svg>
    </div>
    <div class="logo-text">Hotel Atithi <span>Kathiyawadi Restaurant · Palanpur</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="#home" class="active">Home</a></li>
    <li><a href="#menu">Menu</a></li>
    <li><a href="#gallery">Gallery</a></li>
    <li><a href="#map-section">Map</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="#home"        onclick="closeMobile()">Home</a>
  <a href="#menu"        onclick="closeMobile()">Menu</a>
  <a href="#gallery"     onclick="closeMobile()">Gallery</a>
  <a href="#map-section" onclick="closeMobile()">Map</a>
  <a href="#contact"     onclick="closeMobile()">Contact</a>
</div>

<!-- HERO -->
<section id="home">
  <div class="hero-slides">
    <div class="hero-slide active" style="background-image:url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1800&q=80')"></div>
    <div class="hero-slide" style="background-image:url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1800&q=80')"></di
